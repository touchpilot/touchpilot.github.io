name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout touchpilot-site
        uses: actions/checkout@v4
        with:
          path: touchpilot-site

      - name: Checkout touchpilot product repo
        uses: actions/checkout@v4
        with:
          repository: touchpilot/touchpilot
          ref: main
          path: touchpilot

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: touchpilot-site/package-lock.json

      - name: Install dependencies
        working-directory: touchpilot-site
        run: npm ci

      - name: Import skills data
        working-directory: touchpilot-site
        env:
          TOUCHPILOT_REPO_DIR: ${{ github.workspace }}/touchpilot
        run: node scripts/import-skills.mjs

      - name: Build
        working-directory: touchpilot-site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: touchpilot-site/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4